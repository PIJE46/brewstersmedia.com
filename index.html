<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brewsters | Photography</title>
    <style>
        /* Global Aesthetic */
        body { background-color: #000; color: #fff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; padding: 0; }
        header { border-bottom: 1px solid #222; padding: 40px 20px; text-align: center; }
        nav a { color: #777; text-decoration: none; margin: 0 15px; text-transform: uppercase; letter-spacing: 2px; font-size: 13px; cursor: pointer; }
        nav a:hover { color: #fff; }
        .section { display: none; padding: 60px 20px; max-width: 1100px; margin: auto; }
        .active { display: block; }

        /* About Layout */
        .about-container { display: flex; gap: 50px; }
        .about-photo { flex: 1; background: #111; border: 1px solid #333; min-height: 500px; display: flex; align-items: center; justify-content: center; }
        .about-text { flex: 1; border-left: 2px solid #fff; padding-left: 40px; display: flex; flex-direction: column; justify-content: center; }

        /* Gallery Grid */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .grid-item { aspect-ratio: 1/1; background: #111; border: 1px solid #222; }

        /* Social Feed Aesthetic: Grayscale to Color */
        .lightwidget-widget {
            filter: grayscale(100%);
            transition: filter 0.6s ease;
        }
        .lightwidget-widget:hover {
            filter: grayscale(0%);
        }

        /* Form Styling */
        .inquire-form { display: flex; flex-direction: column; max-width: 500px; margin: auto; background: #050505; padding: 30px; border: 1px solid #111; }
        .prompt-step { display: none; margin-top: 20px; animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        label { display: block; margin-bottom: 8px; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; color: #aaa; }
        input, select, textarea { width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: #fff; box-sizing: border-box; font-size: 14px; font-family: inherit; }
        input:focus, textarea:focus { border-color: #fff; outline: none; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        
        .submit-btn { background: #fff; color: #000; border: none; padding: 18px; margin-top: 30px; font-weight: bold; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        .submit-btn:hover { background: #888; }
    </style>
</head>
<body>

<header>
    <h1 style="letter-spacing: 8px; font-size: 2.5rem; margin-bottom: 5px;">BREWSTERS</h1>
    <p style="color: #666; font-style: italic; margin-bottom: 25px;">Shoot Pictures Not People</p>
    <nav>
        <a onclick="showSection('home')">Home</a>
        <a onclick="showSection('about')">About</a>
        <a onclick="showSection('gallery')">Gallery</a>
        <a onclick="showSection('social')">Social</a>
        <a onclick="showSection('inquire')">Inquire</a>
    </nav>
</header>

<!-- HOME -->
<div id="home" class="section active">
    <h2 style="text-align: center; margin-top: 120px; font-weight: 200; letter-spacing: 4px;">VISUAL STORYTELLING</h2>
</div>

<!-- ABOUT -->
<div id="about" class="section">
    <div class="about-container">
        <div class="about-photo">[ IMAGE ]</div>
        <div class="about-text">
            <h2>THE VISION</h2>
            <p>Capturing high-contrast imagery that demands attention. Specialized in sports, vlogs, and brand promotions.</p>
        </div>
    </div>
</div>

<!-- GALLERY -->
<div id="gallery" class="section">
    <div class="grid">
        <div class="grid-item"></div><div class="grid-item"></div><div class="grid-item"></div><div class="grid-item"></div>
    </div>
</div>

<!-- SOCIAL (Updated Widget) -->
<div id="social" class="section">
    <h2 style="text-align: center; letter-spacing: 5px; margin-bottom: 30px;">@ELIJAHBREWSTER_</h2>
    <!-- LightWidget WIDGET -->
    <script src="https://cdn.lightwidget.com/widgets/lightwidget.js"></script>
    <iframe src="https://cdn.lightwidget.com/widgets/fc4261e4ecd95d708ed7b6001dd06cf2.html" scrolling="no" allowtransparency="true" class="lightwidget-widget" style="width:100%;border:0;overflow:hidden;"></iframe>
</div>

<!-- INQUIRE -->
<div id="inquire" class="section">
    <h2 style="text-align: center; letter-spacing: 5px; margin-bottom: 30px;">INQUIRE</h2>
    <form class="inquire-form" action="https://formspree.io/f/xaqvgjwj" method="POST">
        
        <label>Full Name</label>
        <input type="text" name="name" required>

        <label style="margin-top:20px;">Type of Content</label>
        <select name="content-type">
            <option>Sports Content</option>
            <option>Couples Sessions</option>
            <option>Graduation Content</option>
            <option>Small Business Promotions</option>
            <option>Vlogs</option>
        </select>

        <label style="margin-top:20px;">Modality</label>
        <select name="modality">
            <option>Photo</option>
            <option>Video</option>
        </select>

        <div style="margin-top: 20px; border: 1px solid #222; padding: 15px;">
            <label>Step 1: Select Date</label>
            <input type="date" id="dateInput" name="date" onchange="showTime()" required>
        </div>

        <div id="timeStep" class="prompt-step">
            <label>Step 2: Time Preference</label>
            <input type="text" id="timeInput" name="time" placeholder="Enter preferred time" oninput="showLocation()">
        </div>

        <div id="locationStep" class="prompt-step">
            <label>Step 3: Location</label>
            <input type="text" name="location" placeholder="City or Venue">
        </div>

        <div style="margin-top: 20px;">
            <label>Tell me about your project</label>
            <textarea name="message" rows="4" placeholder="Share your vision..."></textarea>
        </div>

        <button type="submit" class="submit-btn">SUBMIT REQUEST</button>
    </form>
</div>

<script>
    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function showTime() {
        document.getElementById('timeStep').style.display = 'block';
    }

    function showLocation() {
        const timeVal = document.getElementById('timeInput').value;
        if(timeVal.length > 0) {
            document.getElementById('locationStep').style.display = 'block';
        }
    }
</script>

</body>
</html>
