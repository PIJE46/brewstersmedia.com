<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brewsters | Photography</title>
    <style>
        @font-face {
            font-family: 'Protest';
            src: url('protest.ttf') format('truetype');
        }

        body { 
            background-color: #000; color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden; 
        }

        header { border-bottom: 1px solid #222; padding: 40px 20px; text-align: center; }
        header h1 { font-family: 'Protest', sans-serif; letter-spacing: 8px; font-size: 2.5rem; margin-bottom: 5px; }
        
        nav { margin-top: 20px; }
        nav a { color: #777; text-decoration: none; margin: 0 15px; text-transform: uppercase; letter-spacing: 2px; font-size: 13px; cursor: pointer; transition: 0.3s; }
        nav a:hover { color: #fff; }

        .section { display: none; padding: 60px 20px; max-width: 1100px; margin: auto; }
        .active { display: block; }

        /* Gallery Grid & Vertical Scroll Logic */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .grid-item { 
            aspect-ratio: 16/9; background: #111; border: 1px solid #222; 
            overflow: hidden; position: relative; cursor: pointer; 
            display: flex; align-items: center; justify-content: center;
        }

        .live-play-bg {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 300%; /* Height for the 3-step vertical move */
            background-repeat: repeat-y;
            background-position: top center;
            background-size: cover; /* Forces the image to fill the width */
            transition: transform 1.2s steps(3); 
            z-index: 1; 
            opacity: 0.3; 
            filter: grayscale(100%);
            border: 1px solid red; /* TEMPORARY: Remove this once you see the image */
        }

        .grid-item:hover .live-play-bg { 
            transform: translateY(-66.6%); 
            opacity: 0.8; 
            filter: grayscale(0%); 
        }

        .grid-item span { position: relative; z-index: 2; letter-spacing: 4px; text-transform: uppercase; font-weight: bold; font-size: 18px; text-shadow: 0px 0px 10px rgba(0,0,0,1); }

        /* Paths - Adjusting Couples to match your screenshot exactly */
        .sports-bg { background-image: url('sports/preview.jpg'); }
        .couples-bg { background-image: url('couples/preview.jpg.jpg'); } 
        .business-bg { background-image: url('business/preview.jpg'); }
        .vlogs-bg { background-image: url('vlogs/preview.jpg'); }

        .sub-gallery { display: none; }
        .photo-feed { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .photo-feed img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
    </style>
</head>
<body>

<header>
    <h1>BREWSTERS</h1>
    <nav>
        <a onclick="showSection('home')">Home</a>
        <a onclick="showSection('gallery')">Gallery</a>
        <a onclick="showSection('inquire')">Inquire</a>
    </nav>
</header>

<div id="gallery" class="section active">
    <div id="gallery-main">
        <div class="grid">
            <div class="grid-item" onclick="openSubGallery('sports-view')">
                <div class="live-play-bg sports-bg"></div>
                <span>Sports</span>
            </div>
            <div class="grid-item" onclick="openSubGallery('couples-view')">
                <div class="live-play-bg couples-bg"></div>
                <span>Couples</span>
            </div>
            <div class="grid-item" onclick="openSubGallery('business-view')">
                <div class="live-play-bg business-bg"></div>
                <span>Business</span>
            </div>
            <div class="grid-item" onclick="openSubGallery('vlogs-view')">
                <div class="live-play-bg vlogs-bg"></div>
                <span>Vlogs</span>
            </div>
        </div>
    </div>

    <div id="couples-view" class="sub-gallery">
        <h2 onclick="closeSubGallery()" style="cursor:pointer">← BACK</h2>
        <div class="photo-feed">
            <img src="couples/EJ108492.jpeg">
            <img src="couples/EJ108642.jpeg">
            <img src="couples/EJ108709.jpeg">
        </div>
    </div>
</div>

<script>
    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    function openSubGallery(id) {
        document.getElementById('gallery-main').style.display = 'none';
        document.getElementById(id).style.display = 'block';
    }
    function closeSubGallery() {
        document.getElementById('gallery-main').style.display = 'block';
        document.querySelectorAll('.sub-gallery').forEach(g => g.style.display = 'none');
    }
</script>

</body>
</html>
